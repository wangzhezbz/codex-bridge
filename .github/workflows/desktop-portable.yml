name: Desktop Portable Build

on:
  workflow_dispatch:
  push:
    branches:
      - "codex/all-model-contract-lock"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest
    env:
      TEMP: ${{ runner.temp }}
      TMP: ${{ runner.temp }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check:syntax

      - name: Run router tests
        run: npm run test:router

      - name: Run desktop CSS tests
        run: node --test tests/desktop-css.test.js

      - name: Run desktop data-dir tests
        run: node --test tests/desktop-data-dir.test.js

      - name: Run desktop renderer tests
        run: node --test tests/desktop-renderer.test.js

      - name: Run desktop settings tests
        run: node --test tests/desktop-settings.test.js

      - name: Run desktop updater tests
        run: node --test tests/desktop-updater.test.js

      - name: Run desktop usage tests
        run: node --test tests/desktop-usage.test.js

      - name: Run documentation link tests
        run: node --test tests/documentation-links.test.js

      - name: Run package naming tests
        run: node --test tests/package-naming.test.js

      - name: Run router health tests
        run: node --test tests/router-health.test.js

      - name: Package Windows portable app
        env:
          CODEXBRIDGE_RELEASE_VERSION: ${{ github.ref_name }}
        run: npm run package:win

      - name: Smoke test packaged Windows app
        run: npm run package:win:smoke

      - name: Create Windows release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist-artifacts" | Out-Null
          Compress-Archive -Path "release/*" -DestinationPath "dist-artifacts/CodexBridge-Windows-x64-Portable.zip" -Force

      - name: Upload Windows portable app
        uses: actions/upload-artifact@v4
        with:
          name: CodexBridge-Windows-x64-Portable
          path: dist-artifacts/CodexBridge-Windows-x64-Portable.zip

  macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run macOS packaging checks
        run: |
          node --check scripts/package-macos.mjs
          node --check scripts/smoke-packaged-macos.mjs
          node --check desktop/data-dir.cjs

      - name: Package macOS portable app
        env:
          CODEXBRIDGE_RELEASE_VERSION: ${{ github.ref_name }}
          CODEXBRIDGE_MAC_ARCH: ${{ matrix.arch }}
        run: npm run package:mac

      - name: Smoke test packaged macOS router
        env:
          CODEXBRIDGE_MAC_ARCH: ${{ matrix.arch }}
        run: npm run package:mac:smoke

      - name: Create macOS release archive
        run: |
          mkdir -p dist-artifacts
          app_path="$(find release -path "*/CodexBridge-darwin-${{ matrix.arch }}/CodexBridge.app" -type d | head -n 1)"
          test -n "$app_path"
          ditto -c -k --keepParent "$app_path" "dist-artifacts/CodexBridge-macOS-${{ matrix.arch }}-Portable.zip"

      - name: Upload macOS portable app
        uses: actions/upload-artifact@v4
        with:
          name: CodexBridge-macOS-${{ matrix.arch }}-Portable
          path: dist-artifacts/CodexBridge-macOS-${{ matrix.arch }}-Portable.zip

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download portable artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          make_latest: true
          generate_release_notes: true
          body: |
            Windows:
            https://github.com/${{ github.repository }}/releases/latest/download/CodexBridge-Windows-x64-Portable.zip

            Mac M series:
            https://github.com/${{ github.repository }}/releases/latest/download/CodexBridge-macOS-arm64-Portable.zip

            Mac Intel:
            https://github.com/${{ github.repository }}/releases/latest/download/CodexBridge-macOS-x64-Portable.zip
          files: dist-artifacts/*.zip
